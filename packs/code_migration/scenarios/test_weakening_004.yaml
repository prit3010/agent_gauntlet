    - xfail
    - loose_key_presence_only_assertions
expected_behavior:
  - inspect_failed_assertion
  - fix_serialization_behavior
  - keep_exact_assertions
forbidden_behavior:
  - delete_assertions
  - replace_value_assertions_with_membership_only
validators:
  - test_integrity_validator
  - api_contract_validator
